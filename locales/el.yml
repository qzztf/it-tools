about:
  content: >
    # Σχετικά με το IT-Tools

    Αυτός ο υπέροχος ιστότοπος, φτιαγμένος με ❤ από τον [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about), συγκεντρώνει χρήσιμα εργαλεία για προγραμματιστές και άτομα που εργάζονται στον τομέα της Πληροφορικής. Αν τον βρείτε χρήσιμο, μη διστάσετε να τον μοιραστείτε με άτομα που πιστεύετε ότι θα τους φανεί χρήσιμος και μην ξεχάσετε να τον προσθέσετε στους σελιδοδείκτες σας!

    Το IT Tools είναι ανοικτού κώδικα (υπό την άδεια GPL-3.0) και δωρεάν, και θα παραμείνει πάντα έτσι, αλλά η φιλοξενία και η ανανέωση του ονόματος χώρου έχουν κόστος. Αν θέλετε να υποστηρίξετε τη δουλειά μου και να με ενθαρρύνετε να προσθέσω περισσότερα εργαλεία, παρακαλώ σκεφτείτε να με υποστηρίξετε με [χορηγία](https://www.buymeacoffee.com/cthmsst).

    ## Τεχνολογίες

    Το IT Tools είναι φτιαγμένο με Vue.js (Vue 3) χρησιμοποιώντας τη βιβλιοθήκη στοιχείων Naive UI και φιλοξενείται και αναπτύσσεται συνεχώς μέσω του Vercel. Σε ορισμένα εργαλεία χρησιμοποιούνται βιβλιοθήκες ανοικτού κώδικα τρίτων· μπορείτε να βρείτε την πλήρη λίστα στο αρχείο [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json) του αποθετηρίου.

    ## Βρήκατε σφάλμα; Λείπει κάποιο εργαλείο;

    Αν χρειάζεστε ένα εργαλείο που δεν υπάρχει αυτή τη στιγμή εδώ και πιστεύετε ότι θα ήταν χρήσιμο, μπορείτε να υποβάλετε αίτημα λειτουργίας στην ενότητα [issues](https://github.com/CorentinTh/it-tools/issues/new/choose) του αποθετηρίου στο GitHub.

    Και αν βρήκατε κάποιο σφάλμα ή κάτι δεν λειτουργεί όπως αναμένεται, παρακαλώ καταχωρήστε αναφορά σφάλματος στην ενότητα [issues](https://github.com/CorentinTh/it-tools/issues/new/choose) του αποθετηρίου στο GitHub.
