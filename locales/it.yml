about:
  content: >
    # Informazioni su IT-Tools
    Questo meraviglioso sito web, realizzato con ❤ da [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about), aggrega strumenti utili per sviluppatori e persone che lavorano nel settore IT. Se lo trovi utile, sentiti libero di condividerlo con persone che pensi possano trovarlo utile anche loro e non dimenticare di aggiungerlo ai preferiti nella tua barra dei collegamenti!
    IT Tools è open-source (sotto licenza GPL-3.0) e gratuito, e lo sarà sempre, ma mi costa denaro per l'hosting e il rinnovo del nome di dominio. Se vuoi sostenere il mio lavoro e incoraggiarmi ad aggiungere altri strumenti, considera di sostenermi [sponsorizzandomi](https://www.buymeacoffee.com/cthmsst).
    ## Tecnologie
    IT Tools è realizzato in Vue.js (Vue 3) con la libreria di componenti Naive UI ed è ospitato e distribuito continuamente da Vercel. Le librerie open-source di terze parti vengono utilizzate in alcuni strumenti, puoi trovare l'elenco completo nel file [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json) del repository.
    ## Trovato un bug? Manca uno strumento?
    Se hai bisogno di uno strumento che al momento non è presente qui e pensi possa essere utile, sei invitato a inviare una richiesta di funzionalità nella [sezione delle issues](https://github.com/CorentinTh/it-tools/issues/new/choose) nel repository GitHub.
    E se hai trovato un bug, o qualcosa non funziona come previsto, per favore presenta una segnalazione di bug nella [sezione delle issues](https://github.com/CorentinTh/it-tools/issues/new/choose) nel repository GitHub.
